name: Refresh Visual Baselines (manual)

# On-demand regeneration of the TOKEN-007 visual-regression baselines.
#
# Why this exists: baselines are environment-specific PNGs. The nightly diff
# (visual-regression.yml) runs on ubuntu-latest + chromium; regenerating them
# on a developer's macOS produces font-rendering drift that then *fails* the
# nightly against its own author. This job regenerates them in the exact same
# CI environment so the new baselines match what the nightly will compare to.
#
# Run it after an intentional design change (e.g. the v1.11.0 Factors
# Contribution Waterfall altered the Factors page layout):
#   GitHub → Actions → "Refresh Visual Baselines (manual)" → Run workflow
#
# Output: the regenerated baselines upload as an artifact, and (default) a PR
# is opened against the run's branch so the PNG image-diffs are reviewable
# before they land. Set `open_pr=false` to only produce the artifact.
#
# Required repo secrets (same as visual-regression.yml):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY,
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, SUPABASE_ANON_KEY

on:
  workflow_dispatch:
    inputs:
      open_pr:
        description: 'Open a PR with the refreshed baselines (else artifact only)'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Regenerate baselines (chromium 1440x900)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: npm run test:visual:update
        env:
          CI: 'true'
          NODE_ENV: 'test'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload regenerated baselines artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/visual/baseline/
          retention-days: 14
          if-no-files-found: warn

      - name: Open PR with refreshed baselines
        if: ${{ inputs.open_pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- tests/visual/baseline/; then
            echo "No baseline changes — the rendered pages already match committed baselines. Nothing to PR."
            exit 0
          fi

          BRANCH="chore/visual-baseline-refresh-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add tests/visual/baseline/
          git commit -m "chore(visual): refresh visual-regression baselines

          Regenerated in CI (ubuntu-latest + chromium 1440x900) via
          visual-baseline-refresh.yml. Review the PNG image-diffs before merge."
          git push origin "$BRANCH"

          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH" \
            --title "chore(visual): refresh visual-regression baselines" \
            --body "Regenerated the TOKEN-007 visual baselines in CI (ubuntu-latest + chromium 1440x900) so they match the nightly diff environment.

          **Review:** GitHub renders PNG image-diffs in the Files tab — eyeball each changed page (expect the Factors page to change from the v1.11.0 Contribution Waterfall) and confirm every diff is an *intended* design change, not a regression.

          Generated by \`visual-baseline-refresh.yml\` run #${{ github.run_id }}."
