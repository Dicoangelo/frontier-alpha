name: Architecture Drift Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  arch-check:
    name: Architecture Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history for `git rev-parse HEAD` resolution.
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Verify schemas/arch.json matches HEAD
        run: node scripts/arch-scanner.mjs --check
