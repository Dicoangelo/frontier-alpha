name: Nightly E2E (Visual + Walkthrough)

# Two playwright suites running in one workflow:
#
# 1. TOKEN-007 visual regression (snapshot diff per page x theme,
#    18 tests). On any diff > 1% per channel, fails + uploads diff
#    PNGs as artifacts.
#
# 2. Phase D walkthrough (smoke navigation, 16 tests). For each
#    primary page: navigate, wait for ready anchor, assert no
#    console.error and no unexpected 5xx during load. Catches the
#    class of bug the v1.3.4-v1.3.13 user audit kept finding —
#    silent failures, broken handlers, server crashes — without
#    requiring a human to click everything.
#
# Triggers:
#   - 06:00 UTC nightly (02:00 ET) — run when nobody is shipping
#   - workflow_dispatch — manual reruns after a baseline update or
#     after fixing a walkthrough regression
#
# Required repo secrets:
#   - VITE_SUPABASE_URL
#   - VITE_SUPABASE_ANON_KEY
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_KEY
#   - SUPABASE_ANON_KEY (or VITE_SUPABASE_ANON_KEY — auth-helper accepts either)
#
# Failure artifacts:
#   playwright-report and test-results directories upload as artifacts
#   for both suites' failures, so the operator can pull the actual
#   diff PNGs / failure traces.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: Visual diff + walkthrough (chromium 1440x900)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: npm run test:visual
        env: &e2e_env
          CI: 'true'
          NODE_ENV: 'test'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run walkthrough smoke suite
        # Always run walkthrough even if visual failed — they test
        # different things and a stale baseline shouldn't hide a real
        # walkthrough regression.
        if: always()
        run: npm run test:walkthrough
        env: *e2e_env

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            tests/visual/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            test-results/
            tests/visual/test-results/
          retention-days: 14
          if-no-files-found: ignore
